<!DOCTYPE html>
<html>
<body style="margin:0; background:#050505; overflow:hidden;">
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';

    // 1. Scene Setup
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050505, 0.002);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
    camera.position.z = 180;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // 2. High-Density Particle System
    const particleCount = 150000; 
    const geometry = new THREE.BufferGeometry();
    
    // Using typed arrays for memory efficiency
    const positions = new Float32Array(particleCount * 3);
    const basePositions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);

    const colorWater = new THREE.Color(0x00ffcc);
    const colorDeep = new THREE.Color(0x0066ff);
    const colorFoam = new THREE.Color(0xffffff);

    for (let i = 0; i < particleCount; i++) {
        // Generate a hollow-ish sphere
        const radius = 40 + Math.random() * 60;
        const theta = Math.random() * 2 * Math.PI;
        const phi = Math.acos((Math.random() * 2) - 1);

        const x = radius * Math.sin(phi) * Math.cos(theta);
        const y = radius * Math.sin(phi) * Math.sin(theta);
        const z = radius * Math.cos(phi);

        positions[i * 3] = x;
        positions[i * 3 + 1] = y;
        positions[i * 3 + 2] = z;
        
        basePositions[i * 3] = x;
        basePositions[i * 3 + 1] = y;
        basePositions[i * 3 + 2] = z;

        // Mix colors to look like water/galaxy
        const mixedColor = colorWater.clone().lerp(colorDeep, Math.random());
        if(Math.random() > 0.9) mixedColor.lerp(colorFoam, 0.8);

        colors[i * 3] = mixedColor.r;
        colors[i * 3 + 1] = mixedColor.g;
        colors[i * 3 + 2] = mixedColor.b;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
        size: 0.7,
        vertexColors: true,
        transparent: true,
        opacity: 0.6,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // 3. Animation Loop (The Math)
    let time = 0;
    function animate() {
        requestAnimationFrame(animate);
        time += 0.015;

        const posArray = particles.geometry.attributes.position.array;

        for (let i = 0; i < particleCount; i++) {
            const bx = basePositions[i * 3];
            const by = basePositions[i * 3 + 1];
            const bz = basePositions[i * 3 + 2];

            // Pseudo curl-noise fluid distortion
            const waveX = Math.sin(time + by * 0.05) * 4;
            const waveY = Math.cos(time + bx * 0.05) * 4;
            const waveZ = Math.sin(time + bz * 0.05) * 4;

            // Vortex swirl effect based on height
            const angle = time * 0.5 + (by * 0.02);
            const cosA = Math.cos(angle);
            const sinA = Math.sin(angle);

            // Apply mutation
            posArray[i * 3] = (bx * cosA - bz * sinA) + waveX;
            posArray[i * 3 + 1] = by + waveY;
            posArray[i * 3 + 2] = (bx * sinA + bz * cosA) + waveZ;
        }

        // Flag the buffer to upload to the GPU
        particles.geometry.attributes.position.needsUpdate = true;
        
        // Global rotation
        particles.rotation.y += 0.001;
        particles.rotation.x += 0.002;

        renderer.render(scene, camera);
    }
    animate();

    // 4. Desktop OS Controls
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.addEventListener('contextmenu', (e) => e.preventDefault());

    window.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'q') {
            e.preventDefault();
            window.quitApp(); 
        }
        if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
            e.preventDefault();
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    });
  </script>
</body>
</html>
