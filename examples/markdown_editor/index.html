<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Live Editor</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,500;0,600;1,400&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #060709;
            --sidebar-bg: rgba(10, 12, 18, 0.7);
            --panel-bg: rgba(18, 22, 33, 0.45);
            --border-color: rgba(255, 255, 255, 0.05);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-cyan: #00f2fe;
            --accent-purple: #a855f7;
            --accent-green: #10b981;
            --font-main: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --font-serif: 'Playfair Display', Georgia, serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(at 0% 100%, rgba(168, 85, 247, 0.08) 0px, transparent 45%),
                radial-gradient(at 100% 0%, rgba(0, 242, 254, 0.08) 0px, transparent 45%);
            color: var(--text-primary);
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        /* Sidebar File Navigator */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            backdrop-filter: blur(40px);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: -0.5px;
            padding: 24px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .brand-icon {
            width: 24px;
            height: 24px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 16px rgba(0, 242, 254, 0.3);
        }

        .dir-nav {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .path-display {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            background: rgba(0, 0, 0, 0.25);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .up-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .up-btn svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            stroke-width: 2.5;
            fill: none;
        }

        .up-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .file-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            color: var(--text-secondary);
        }

        .file-item svg {
            width: 16px;
            height: 16px;
            stroke-width: 2;
            fill: none;
            flex-shrink: 0;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
        }

        .file-item.dir {
            color: var(--accent-cyan);
            font-weight: 500;
        }

        .file-item.dir svg {
            stroke: var(--accent-cyan);
        }

        .file-item.file svg {
            stroke: var(--text-secondary);
        }

        .file-item.active {
            background: rgba(168, 85, 247, 0.06);
            border-color: rgba(168, 85, 247, 0.15);
            color: var(--accent-purple);
        }

        .file-item.active svg {
            stroke: var(--accent-purple);
        }

        .file-meta {
            margin-left: auto;
            font-size: 0.72rem;
            color: var(--text-secondary);
            font-family: var(--font-mono);
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }

        .quit-btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(244, 63, 94, 0.15);
            background: rgba(244, 63, 94, 0.06);
            color: var(--accent-red);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .quit-btn:hover {
            background: rgba(244, 63, 94, 0.12);
            border-color: rgba(244, 63, 94, 0.35);
        }

        /* Workspace Workspace */
        .workspace {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Toolbar */
        .toolbar {
            height: 70px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            background: rgba(6, 7, 9, 0.4);
            backdrop-filter: blur(15px);
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .file-name-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            padding: 8px 14px;
            width: 240px;
            outline: none;
            transition: border-color 0.25s ease;
        }

        .file-name-input:focus {
            border-color: var(--accent-purple);
        }

        .btn-action {
            background: linear-gradient(135deg, var(--accent-purple), #c084fc);
            color: #0b0514;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.25);
        }

        .btn-action:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.35);
        }

        .editor-container {
            flex-grow: 1;
            display: flex;
            overflow: hidden;
        }

        /* Editor Column */
        .editor-pane {
            width: 50%;
            height: 100%;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.15);
        }

        .pane-header {
            padding: 14px 24px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            font-weight: 700;
            border-bottom: 1px solid var(--border-color);
            background: rgba(18, 22, 33, 0.2);
            display: flex;
            justify-content: space-between;
        }

        .editor-textarea {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            line-height: 1.8;
            padding: 28px;
            resize: none;
            outline: none;
            overflow-y: auto;
            user-select: text;
        }

        /* Preview Column */
        .preview-pane {
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: transparent;
        }

        .preview-body {
            flex-grow: 1;
            padding: 36px 40px;
            overflow-y: auto;
            user-select: text;
        }

        /* Premium Markdown Styles */
        .markdown-content {
            color: #e2e8f0;
            line-height: 1.8;
            font-size: 1.05rem;
        }

        .markdown-content h1 {
            color: var(--text-primary);
            font-family: var(--font-serif);
            font-size: 2.2rem;
            margin-bottom: 24px;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 10px;
            line-height: 1.3;
        }

        .markdown-content h2 {
            color: var(--text-primary);
            font-size: 1.55rem;
            margin-top: 36px;
            margin-bottom: 18px;
            font-weight: 600;
            font-family: var(--font-main);
            letter-spacing: -0.5px;
        }

        .markdown-content h3 {
            color: var(--text-primary);
            font-size: 1.25rem;
            margin-top: 28px;
            margin-bottom: 14px;
            font-weight: 600;
        }

        .markdown-content p {
            margin-bottom: 20px;
        }

        .markdown-content a {
            color: var(--accent-cyan);
            text-decoration: none;
            border-bottom: 1px solid rgba(0, 242, 254, 0.2);
            transition: all 0.2s;
        }

        .markdown-content a:hover {
            border-bottom-color: var(--accent-cyan);
        }

        .markdown-content ul,
        .markdown-content ol {
            margin-bottom: 20px;
            padding-left: 28px;
        }

        .markdown-content li {
            margin-bottom: 8px;
        }

        .markdown-content blockquote {
            border-left: 4px solid var(--accent-purple);
            padding: 10px 0 10px 24px;
            font-style: italic;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.01);
            margin: 28px 0;
            border-radius: 0 8px 8px 0;
        }

        .markdown-content code {
            font-family: var(--font-mono);
            font-size: 0.85em;
            background: rgba(255, 255, 255, 0.05);
            padding: 3px 8px;
            border-radius: 6px;
            color: #f1f5f9;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .markdown-content pre {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
            margin-bottom: 24px;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.4);
        }

        .markdown-content pre code {
            background: transparent;
            padding: 0;
            border-radius: 0;
            font-size: 0.85rem;
            border: none;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 28px;
            font-size: 0.95rem;
        }

        .markdown-content th {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .markdown-content td {
            border: 1px solid var(--border-color);
            padding: 10px 16px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.16);
        }
    </style>
</head>

<body>
    <!-- Sidebar File Navigator -->
    <div class="sidebar">
        <div class="brand">
            <div class="brand-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#040810" stroke-width="3">
                    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                </svg>
            </div>
            <span class="brand-text">V-MD Editor</span>
        </div>
        <div class="dir-nav">
            <button class="up-btn" onclick="navigateUp()">
                <svg viewBox="0 0 24 24">
                    <path d="M18 15l-6-6-6 6" />
                </svg>
                <span>Go Up Directory</span>
            </button>
            <div class="path-display" id="path-text">/Users/codecaine</div>
        </div>
        <div class="file-list" id="file-container">
            <!-- Dynamically populated -->
        </div>
        <div class="sidebar-footer">
            <button class="quit-btn" onclick="window.quitApp()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />
                </svg>
                <span>Quit App</span>
            </button>
        </div>
    </div>

    <!-- Workspace Main Layout -->
    <div class="workspace">
        <div class="toolbar">
            <div class="file-info">
                <input class="file-name-input" type="text" id="active-filename" placeholder="untitled.md">
                <button class="btn-action" onclick="saveFile()">Save File</button>
            </div>
            <div style="font-size: 0.8rem; color: var(--text-secondary); font-family: var(--font-mono);"
                id="save-status">Ready.</div>
        </div>

        <div class="editor-container">
            <!-- Middle Pane: Text Editor -->
            <div class="editor-pane">
                <div class="pane-header">
                    <span>Editor Pane</span>
                    <span id="char-word-count">0 chars | 0 words</span>
                </div>
                <textarea class="editor-textarea" id="editor" placeholder="Write markdown here..."
                    oninput="onTextChange()"></textarea>
            </div>

            <!-- Right Pane: Live HTML Preview -->
            <div class="preview-pane">
                <div class="pane-header">Live HTML Preview</div>
                <div class="preview-body">
                    <div class="markdown-content" id="preview">
                        <h1>Markdown Live Preview</h1>
                        <p>Open a markdown file from the sidebar, or start writing on the left to see the live output
                            formatted here.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentDirPath = '';
        let activeFilePath = '';

        // Clean vector Icons for files/folders
        const dirIconSvg = `<svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5c0-1.1.9-2 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`;
        const fileIconSvg = `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;

        function compileMarkdown(md) {
            if (window.marked && window.marked.parse) {
                return window.marked.parse(md);
            }

            let html = md
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
                .replace(/\*(.*)\*/gim, '<em>$1</em>')
                .replace(/^\> (.*$)/gim, '<blockquote>$1</blockquote>')
                .replace(/`([^`]+)`/gim, '<code>$1</code>')
                .replace(/\n\n/g, '<br><br>');

            return html;
        }

        async function init() {
            try {
                currentDirPath = await window.getHomeDirectory();
                loadDirectory(currentDirPath);
            } catch (err) {
                console.error("Initialization failed: ", err);
            }
        }

        async function loadDirectory(path) {
            currentDirPath = path;
            document.getElementById('path-text').innerText = path;

            try {
                const items = await window.listDirectory(path);
                const container = document.getElementById('file-container');

                if (items.length === 0) {
                    container.innerHTML = `<div style="text-align: center; color: var(--text-secondary); font-size: 0.8rem; padding-top: 20px; font-style: italic;">No editable files.</div>`;
                    return;
                }

                container.innerHTML = items.map(item => {
                    const iconSvg = item.is_dir ? dirIconSvg : fileIconSvg;
                    const cssClass = item.is_dir ? 'file-item dir' : 'file-item file';
                    const activeClass = item.path === activeFilePath ? ' active' : '';

                    const meta = item.is_dir ? '' : `<span class="file-meta">${escapeHtml(item.mtime)}</span>`;
                    return `
                        <div class="${cssClass}${activeClass}" onclick="handleItemClick('${item.path.replace(/\\/g, '\\\\')}', ${item.is_dir})">
                            ${iconSvg}
                            <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${item.name}</span>
                            ${meta}
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error("Failed to list folder: ", e);
            }
        }

        async function handleItemClick(path, isDir) {
            if (isDir) {
                loadDirectory(path);
            } else {
                activeFilePath = path;

                document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
                event.currentTarget.classList.add('active');

                const name = path.substring(path.lastIndexOf('/') + 1);
                document.getElementById('active-filename').value = name;

                try {
                    const content = await window.readLocalFile(path);
                    const editor = document.getElementById('editor');
                    editor.value = content;

                    onTextChange();
                    showStatus("File loaded.");
                } catch (e) {
                    showStatus("Error loading file.");
                }
            }
        }

        async function navigateUp() {
            try {
                const parent = await window.getParentDirectory(currentDirPath);
                if (parent && parent !== currentDirPath) {
                    loadDirectory(parent);
                }
            } catch (e) {
                console.error(e);
            }
        }

        function onTextChange() {
            const val = document.getElementById('editor').value;
            const preview = document.getElementById('preview');

            preview.innerHTML = compileMarkdown(val);

            const charCount = val.length;
            const wordCount = val.trim() === "" ? 0 : val.trim().split(/\s+/).length;
            document.getElementById('char-word-count').innerText = `${charCount} chars | ${wordCount} words`;
        }

        async function saveFile() {
            const filename = document.getElementById('active-filename').value.trim();
            const content = document.getElementById('editor').value;

            if (!filename) {
                alert("Please enter a valid filename.");
                return;
            }

            let writePath = activeFilePath;
            if (!writePath || !writePath.endsWith(filename)) {
                writePath = currentDirPath + "/" + filename;
            }

            showStatus("Saving...");

            try {
                const res = await window.writeLocalFile(writePath, content);
                if (res === "Success") {
                    showStatus("Saved successfully.");
                    activeFilePath = writePath;
                    loadDirectory(currentDirPath);
                } else {
                    showStatus(res);
                }
            } catch (e) {
                showStatus("Error saving file.");
            }
        }

        function showStatus(text) {
            const el = document.getElementById('save-status');
            el.innerText = text;
            setTimeout(() => {
                if (el.innerText === text) {
                    el.innerText = "Ready.";
                }
            }, 3000);
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        init();
    </script>
</body>

</html>
